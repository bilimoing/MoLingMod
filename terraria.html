<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰拉瑞亚 Mods</title>
  <link rel="icon" type="image/png" href="assets/web-icon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* 🔑 默认隐藏 Token 输入框，由 JS 控制显示 */
    #token-config-inline { display: none !important; }
  </style>
</head>
<body data-page="terraria">
<div class="bg-gif"></div><div class="bg-overlay"></div><div class="bg-glow"></div>

<div class="music-panel" onclick="toggleMusic()"><div class="vinyl" id="vinyl"></div></div>
<div class="lang-switch">
  <button onclick="setLang('zh')" class="lang-btn active">中</button>
  <button onclick="setLang('en')" class="lang-btn">EN</button>
</div>

<audio id="bgm" loop preload="auto"><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

<main class="page-container">
  <a href="index.html" class="back-btn">← 返回主页</a>
  <h2 class="page-title">泰拉瑞亚 Mods</h2>

  <!-- 🔍 搜索栏 -->
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.35-4.35"></path>
    </svg>
    <input type="text" class="search-input" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="搜索 Mod 名称、描述或标签..." oninput="handleSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-results-info" id="search-info"></div>

  <!-- 🔑 Token 配置区（仅用于提升 API 限制，非必需） -->
  <div id="token-config-inline" style="text-align:center;padding:15px;background:rgba(0,0,0,0.3);border-radius:10px;margin-bottom:20px;display:none;">
    <p style="color:#ff9f43;font-size:0.9rem;margin-bottom:10px;" data-i18n="token_needed">可选：输入 Token 提升加载速度</p>
    <label for="inline-gh-token"></label><input type="password" id="inline-gh-token" placeholder="粘贴 github_pat_..." style="padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;width:300px;margin-right:10px;">
    <label style="display:inline-flex;align-items:center;color:#fff;font-size:0.85rem;margin-right:10px;cursor:pointer;" onclick="preventLabelJump(event)">
      <input type="checkbox" id="inline-remember-token" checked style="margin-right:5px;width:auto;"> <span data-i18n="remember_me">记住我</span>
    </label>
    <button onclick="saveInlineToken()" class="glass-btn" style="padding:8px 16px;" data-i18n="save_token">保存</button>
  </div>

  <!-- 🔍 状态提示区（自动显示加载状态） -->
  <div id="debug-status" style="text-align:center;padding:20px;color:#ff9f43;font-size:0.9rem;"></div>

  <div class="mod-grid" id="mod-grid"></div>
</main>

<script src="app.js"></script>
<script>
  // 🔑 内联 Token 保存函数
  function saveInlineToken() {
    const t = document.getElementById('inline-gh-token').value.trim();
    const rememberToken = document.getElementById('inline-remember-token')?.checked;
    
    if(t.startsWith('github_pat_')) {
      const encrypted = encode(t);
      if(rememberToken) {
        localStorage.setItem('gh_token_enc', encrypted);
      } else {
        sessionStorage.setItem('gh_token_session_enc', encrypted);
      }
      state.ghToken = t;
      document.getElementById('token-config-inline').style.display = 'none';
      setStatus('Token 已保存，重新加载中...', '#4ade80');
      setTimeout(() => location.reload(), 1000);
    } else {
      alert('Token 格式错误，必须以 github_pat_ 开头');
    }
  }

  // 游戏页面不需要 Token 也能加载（CDN 公开访问）
  window.addEventListener('DOMContentLoaded', () => {
    console.log('游戏页面加载，自动获取 Mod 数据');
    // Token 输入框默认隐藏，app.js 会自动处理 loadMods 和 renderGamePage
  });
</script>
</body>
</html>
