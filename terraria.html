<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>泰拉瑞亚 Mods</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="terraria"> <!-- 🔑 必须是小写，与上传时的分类值一致 -->

<audio id="bgm" loop preload="auto"><source src="assets/bgm.mp3" type="audio/mpeg"></audio>

<main class="page-container">
  <a href="index.html" class="back-btn">← 返回主页</a>
  <h2 class="page-title">⚔️ 泰拉瑞亚 Mods</h2>
  <div class="mod-grid" id="mod-grid"></div> <!-- 🔑 ID 必须完全一致 -->
</main>
<script src="app.js"></script>
</body>
</html>
